<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard Dívidas em Dia</title>
    <link rel="stylesheet" href="./css/styles.css">
</head>
<body class="bg-gray-100">
    <main class="flex min-h-screen">
        <aside class="w-64 bg-blue-900 text-white flex flex-col p-6">
            <div class="mb-12">

                <h1 class="text-3xl font-bold">
                Dívidas
                </h1>

                <span class="text-xl">
                em dia
                </span>

            </div>
            <nav class="flex flex-col gap-3">

                <a href="#" class="bg-blue-600 rounded-xl px-4 py-3 font-semibold">
                    Dashboard
                </a>

                <a href="#" class="px-4 py-3 hover:bg-blue-800 rounded-xl">
                    Dívidas
                </a>

                <a href="#" class="px-4 py-3 hover:bg-blue-800 rounded-xl">
                    Pagamentos
                </a>

                <a href="#" class="px-4 py-3 hover:bg-blue-800 rounded-xl">
                    Simulador
                </a>

                <a href="#" class="px-4 py-3 hover:bg-blue-800 rounded-xl">
                    Relatórios
                </a>

                <a href="#" class="px-4 py-3 hover:bg-blue-800 rounded-xl">
                    Metas
                </a>

                <a href="#" class="px-4 py-3 hover:bg-blue-800 rounded-xl">
                    Alertas
                </a>

            </nav>
            <div class="flex-1"></div>
            <div class="bg-blue-800 rounded-2xl p-5 mb-6">

                <h2 class="font-bold mb-3">
                    Mantenha o foco!
                </h2>

                <p class="text-sm">
                    Você está no caminho certo para ficar livre das dívidas!
                </p>

            </div>
            <button class="border border-white rounded-full py-3 hover:bg-blue-800">

                Precisa de ajuda?

            </button>
        </aside>
        <section class="flex-1 p-8 bg-gray-100">
            <header class="flex justify-between items-center mb-8">
                <div>
                <h1 class="text-4xl font-bold">Dashboard</h1>
                <p class="text-gray-500">Acompanhe seu progresso e organize suas dívidas</p>
                </div>
                <div>
                    Perfil
                </div>
            </header>
        </main>  
</body>
</html>
